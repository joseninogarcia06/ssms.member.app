version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      SA_PASSWORD: "devDb123456#01"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    networks:
      - app-network

  api:
    build: .
    container_name: ssms-api
    depends_on:
      - db
    environment:
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=MemberDb;User Id=sa;Password=devDb123456#01;"
    ports:
      - "5000:80"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge